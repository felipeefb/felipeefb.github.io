<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Curriculum Vitae - Light Theme</title>
    <script>
        let lang = navigator.language;
        if (lang) {
            lang = lang.toLowerCase();
        }
        if (lang && lang.startsWith('pt')) {
            window.location.href = 'pt-light.html';
        } else {
            window.location.href = 'en-light.html';
        }
    </script>
</head>
<body>
</body>
</html>
